{% extends "base.html" %}
{% block content %}

<div class="card">
  <h1>Edit Job / Service Call</h1>

  <form method="POST" class="form-card">

    <label>Customer</label>
    <select name="customer_id">
      <option value="">Select customer</option>
      {% for c in customers %}
        <option value="{{ c.id }}" {% if job.customer_id == c.id %}selected{% endif %}>
          {{ c.first_name }} {{ c.last_name }} - {{ c.phone }}
        </option>
      {% endfor %}
    </select>

    <label>Property</label>
    <select name="property_id">
      <option value="">Select property</option>
      {% for p in properties %}
        <option value="{{ p.id }}" {% if job.property_id == p.id %}selected{% endif %}>
          {{ p.property_name }} - {{ p.address }}
        </option>
      {% endfor %}
    </select>

    <label>Assign Technician</label>
    <select name="technician">
      <option value="">Unassigned</option>
      {% for t in technicians %}
        <option value="{{ t.name }}" {% if job.technician == t.name %}selected{% endif %}>
          {{ t.name }} - {{ t.phone if t.phone else "no phone" }}
        </option>
      {% endfor %}
    </select>

    <label>Job Type / Description</label>
    <select name="description">
      {% for item in ["Service Call", "AC Not Cooling", "Heating Problem", "Maintenance", "Install", "Estimate / Quote", "Callback", "Warranty"] %}
        <option value="{{ item }}" {% if job.description == item %}selected{% endif %}>{{ item }}</option>
      {% endfor %}
    </select>

    <label>Scheduled Date</label>
    <input type="date" name="scheduled_date" value="{{ job.scheduled_date }}">

    <label>Status</label>
    <select name="status">
      {% for s in ["Scheduled", "In Progress", "Completed", "Pending Quote", "Needs Parts", "Cancelled"] %}
        <option value="{{ s }}" {% if job.status == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>

    <label>Job Notes</label>
    <textarea name="notes">{{ job.notes if job.notes is defined else "" }}</textarea>

    <label>Work Performed</label>
    <textarea name="work_performed">{{ job.work_performed if job.work_performed is defined else "" }}</textarea>

    <button type="submit">Save Job Changes</button>
  </form>

  <div class="action-bar">
    <a class="action-btn" href="/service-jobs/{{ job.id }}">Back to Job</a>
    <a class="action-btn" href="/service-jobs">Back to Jobs</a>
  </div>
</div>

{% endblock %}
