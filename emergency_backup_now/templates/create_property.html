{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Add Property for {{ customer.first_name }} {{ customer.last_name }}</h2>
  <form method="post">
    <input name="property_name" placeholder="Property name" required>
    <input name="address" placeholder="Street address" required>
    <button class="primary-btn" type="submit">Save Property</button>
  </form>
</section>
{% endblock %}
