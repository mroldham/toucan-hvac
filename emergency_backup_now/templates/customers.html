{% extends "base.html" %}
{% block content %}
<h1>Customers</h1>
<a class="button" href="/customers/new">+ Add Customer</a>

<div class="panel">
  {% if customers %}
    {% for c in customers %}
      <div class="customer-row">
        <h3>{{ c.first_name }} {{ c.last_name }}</h3>
        <p>{{ c.phone }} | {{ c.email }}</p>
        <p>{{ c.address }}</p>
      </div>
    {% endfor %}
  {% else %}
    <p>No customers yet.</p>
  {% endif %}
</div>
{% endblock %}
