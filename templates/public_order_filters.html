
<style>
body{margin:0;font-family:Arial, sans-serif;background:#f5fffd;color:#123;}
.hero{background:linear-gradient(135deg,#28c7bd,#eafffb);padding:60px 22px;text-align:center;}
.hero h1{font-size:42px;margin:0;color:#064b4b;}
.hero p{font-size:20px;max-width:760px;margin:18px auto;}
.nav{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:18px;background:white;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.nav a,.btn,button{background:#28c7bd;color:white;text-decoration:none;border:0;border-radius:999px;padding:12px 20px;font-weight:bold;display:inline-block;}
.section{max-width:1000px;margin:24px auto;padding:0 18px;}
.card{background:white;border-radius:22px;padding:22px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:18px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;}
input,textarea,select{width:100%;padding:12px;border-radius:12px;border:1px solid #bbb;margin:7px 0;font-size:16px;}
footer{text-align:center;padding:28px;color:#456;}
</style>

<div class="nav">
  <a href="/public">Home</a>
  <a href="/request-service">Request Service</a>
  <a href="/order-filters">Order Filters</a>
</div>

<div class="section">
  <div class="card">
    <h1>Order Filters</h1>
    <form method="POST">
      <input name="name" placeholder="Name" required>
      <input name="phone" placeholder="Phone" required>
      <input name="email" placeholder="Email">
      <input name="address" placeholder="Delivery / Service Address">
      <input name="filter_size" placeholder="Filter Size, example: 20x25x1" required>
      <input name="quantity" type="number" value="1" min="1" placeholder="Quantity">
      <select name="frequency">
        <option>One-time order</option>
        <option>Every month</option>
        <option>Every 2 months</option>
        <option>Every 3 months</option>
        <option>Every 6 months</option>
      </select>
      <textarea name="notes" placeholder="Notes"></textarea>
      <button type="submit">Send Filter Order</button>
    </form>
  </div>
</div>
