{% extends "base.html" %}

{% block content %}
<div class="page-card">
  <h1>Edit Property</h1>

  {% if customer %}
    <p><strong>Customer:</strong> {{ customer.first_name }} {{ customer.last_name }}</p>
  {% endif %}

  <form method="post">
    <label>Property Name</label>
    <input type="text" name="property_name" value="{{ property.property_name }}" required>

    <label>Address</label>
    <input type="text" name="address" value="{{ property.address }}" required>

    <button type="submit">Save Property</button>
    <a class="button" href="{{ url_for('property_detail', property_id=property.id) }}">Cancel</a>
  </form>
</div>
{% endblock %}
