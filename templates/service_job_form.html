{% extends "base.html" %}
{% block content %}

<div class="card">
  <h1>Add Job / Service Call</h1>

  <form method="POST" class="form-card">

    <label>Customer</label>
    <select name="customer_id">
      <option value="">Select customer</option>
      {% for c in customers %}
        <option value="{{ c.id }}">{{ c.first_name }} {{ c.last_name }} - {{ c.phone }}</option>
      {% endfor %}
    </select>

    <label>Property</label>
    <select name="property_id">
      <option value="">Select property</option>
      {% for p in properties %}
        <option value="{{ p.id }}">{{ p.property_name }} - {{ p.address }}</option>
      {% endfor %}
    </select>

    <label>Assign Technician</label>
    <select name="technician">
      <option value="">Unassigned</option>
      {% for t in technicians %}
        <option value="{{ t.name }}">{{ t.name }} - {{ t.phone if t.phone else "no phone" }}</option>
      {% endfor %}
    </select>

    <label>Job Type / Description</label>
    <select name="description">
      <option>Service Call</option>
      <option>AC Not Cooling</option>
      <option>Heating Problem</option>
      <option>Maintenance</option>
      <option>Install</option>
      <option>Estimate / Quote</option>
      <option>Callback</option>
      <option>Warranty</option>
    </select>

    <label>Scheduled Date</label>
    <input type="date" name="scheduled_date">

    
    <label>Priority</label>
    <select name="priority">
      <option value="Normal" {% if job is defined and job.priority == "Normal" %}selected{% endif %}>Normal</option>
      <option value="Urgent" {% if job is defined and job.priority == "Urgent" %}selected{% endif %}>Urgent</option>
      <option value="Emergency" {% if job is defined and job.priority == "Emergency" %}selected{% endif %}>Emergency</option>
    </select>

    <label>Status</label>
    <select name="status">
      <option>Scheduled</option>
      <option>In Progress</option>
      <option>Completed</option>
      <option>Pending Quote</option>
      <option>Needs Parts</option>
      <option>Cancelled</option>
    </select>

    <label>Job Notes</label>
    <textarea name="notes" placeholder="Customer complaint, gate code, equipment notes, diagnosis, etc."></textarea>

    <button type="submit">Save Job</button>
  </form>
</div>

{% endblock %}
