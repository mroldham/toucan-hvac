{% extends "base.html" %}
{% block content %}

<h1>Job Calendar</h1>

<table class="table">
  <tr>
    <th>Date</th>
    <th>Job</th>
    <th>Technician</th>
    <th>Status</th><th>Open</th>
  </tr>

  {% for job in jobs %}
  <tr>
    <td>{{ job.scheduled_date }}</td>
    <td>{{ job.description }}</td>
    <td>{{ job.technician }}</td>
    <td>{{ job.status }}</td><td><a class="action-btn" href="/service-jobs/{{ job.id }}">Open Job</a></td>
  </tr>
  {% endfor %}

</table>

{% endblock %}
