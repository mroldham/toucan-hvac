{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Customers</h2>
  <form method="post" action="{{ url_for('create_customer') }}">
    <div class="form-grid">
      <input name="first_name" placeholder="First name" required>
      <input name="last_name" placeholder="Last name" required>
      <input name="phone" placeholder="Phone">
      <input name="email" placeholder="Email">
    </div>
    <button class="primary-btn" type="submit">Add Customer</button>
  </form>
</section>

<section class="card">
  <h3>Customer List</h3>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Open</th>
      </tr>
    </thead>
    <tbody>
      {% for customer in customers %}
      <tr>
        <td>{{ customer.first_name }} {{ customer.last_name }}</td>
        <td>{{ customer.phone or "" }}</td>
        <td>{{ customer.email or "" }}</td>
        <td><a href="{{ url_for('customer_detail', customer_id=customer.id) }}">Open</a></td>
      </tr>
      {% else %}
      <tr><td colspan="4">No customers yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
