{% extends "base.html" %}
{% block content %}

<div class="card">
  <h1>Property Map</h1>
  <p>All properties with saved coordinates.</p>

  <div id="map" style="height:650px;width:100%;border-radius:18px;border:1px solid #ddd;"></div>
</div>

<script>
function initMap() {
  const properties = [
    {% for p in properties %}
    {
      name: {{ (p.property_name or "Property")|tojson }},
      address: {{ (p.address or "")|tojson }},
      lat: {{ p.latitude }},
      lng: {{ p.longitude }},
      url: "/properties/{{ p.id }}"
    },
    {% endfor %}
  ];

  const center = properties.length
    ? { lat: properties[0].lat, lng: properties[0].lng }
    : { lat: 30.057, lng: -94.795 };

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 10,
    center: center
  });

  const bounds = new google.maps.LatLngBounds();

  properties.forEach(function(p) {
    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      map: map,
      title: p.name
    });

    const info = new google.maps.InfoWindow({
      content: `
        <b>${p.name}</b><br>
        ${p.address}<br><br>
        <a href="${p.url}">Open Property</a><br>
        <a target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(p.address)}">Navigate</a>
      `
    });

    marker.addListener("click", function() {
      info.open(map, marker);
    });

    bounds.extend(marker.position);
  });

  if (properties.length) {
    map.fitBounds(bounds);
  }
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAXWVwu7HbOrOSeol7FzneHmUpah1iMg6g&callback=initMap">
</script>

{% endblock %}
