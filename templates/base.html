<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Toucan HVAC</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="{{ url_for('static', filename='logo.png') }}" class="logo" onerror="this.style.display='none'">
      <div>
        <div class="brand-title">Toucan HVAC</div>
        <div class="brand-subtitle">Welcome, {{ user.name if user else 'Guest' }}</div>
      </div>
    </div>

    <nav class="tabs">
      <a href="{{ url_for('home') }}">Dashboard</a>
      <a href="{{ url_for('customers') }}">Customers</a>
      <a href="{{ url_for('properties') }}">Properties</a>
      <a href="{{ url_for('equipment') }}">Equipment</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
  </header>

  <main class="page-wrap">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
