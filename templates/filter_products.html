{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div>
    <p class="eyebrow">Toucan HVAC</p>
    <h1>Filter Products & Pricing</h1>
  </div>
  <a class="button" href="/filter-order">View Order Page</a>
</div>

<div class="filter-layout">
  <form method="POST" class="filter-card filter-form">
    <h2>Add Filter</h2>

    <label>Filter Size</label>
    <input name="size" placeholder="20x25x1" required>

    <label>Description</label>
    <input name="description" placeholder="Pleated filter, MERV 8, etc.">

    <label>Price Each</label>
    <input name="price" placeholder="12.99" required>

    <button type="submit" class="filter-submit">Add Filter Product</button>
  </form>

  <div class="filter-card">
    <h2>Current Prices</h2>

    {% if products %}
      {% for p in products %}
        <form method="POST" action="/filter-products/{{ p.id }}/edit" class="price-row">
          <input name="size" value="{{ p.size }}">
          <input name="description" value="{{ p.description or '' }}">
          <input name="price" value="{{ '%.2f'|format(p.price) }}">
          <label class="check-label">
            <input type="checkbox" name="active" {% if p.active %}checked{% endif %}>
            Active
          </label>
          <button type="submit">Save</button>
        </form>
      {% endfor %}
    {% else %}
      <p>No filter products yet. Add your first size on the left.</p>
    {% endif %}
  </div>
</div>

{% endblock %}
