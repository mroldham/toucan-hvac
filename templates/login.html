<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Toucan HVAC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container" style="max-width: 520px; margin-top: 60px;">
        <section class="card">
            <div style="text-align:center; margin-bottom: 20px;">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Toucan HVAC logo" class="logo" onerror="this.style.display='none'">
                <h2 style="margin-bottom: 6px;">Toucan HVAC Login</h2>
                <p>Sign in to access your system</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-wrap">
                        {% for message in messages %}
                            <div class="flash">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="form-grid">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <div style="margin-top:16px; font-size:14px;">
                <strong>Default admin login:</strong><br>
                Email: admin@toucanhvac.local<br>
                Password: admin123
            </div>
        </section>
    </main>
</body>
</html>
