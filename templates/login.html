<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Toucan HVAC Login</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
    .box { background:#111827; padding:30px; border-radius:16px; width:100%; max-width:380px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    input, button { width:100%; padding:12px; margin:8px 0; box-sizing:border-box; border-radius:10px; border:1px solid #374151; }
    input { background:#1f2937; color:white; }
    button { background:#f59e0b; border:0; font-weight:bold; color:#111827; cursor:pointer; }
    .msg { background:#1f2937; padding:10px; border-radius:10px; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Toucan HVAC</h1>
    <p>Sign in</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>
  </div>
</body>
</html>
