<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Toucan HVAC</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f3f4f6; }
    .top { background:#111827; color:white; padding:20px; display:flex; justify-content:space-between; align-items:center; }
    .wrap { max-width:900px; margin:30px auto; padding:0 16px; }
    .card { background:white; border-radius:16px; padding:24px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    a { color:#f59e0b; text-decoration:none; }
  </style>
</head>
<body>
  <div class="top">
    <div><strong>Toucan HVAC</strong></div>
    <div><a href="{{ url_for('logout') }}">Log out</a></div>
  </div>
  <div class="wrap">
    <div class="card">
      <h2>Welcome, {{ user.name }}</h2>
      <p>You are logged in.</p>
      <p>Email: {{ user.email }}</p>
      <p>Role: {{ user.role }}</p>
    </div>
  </div>
</body>
</html>
