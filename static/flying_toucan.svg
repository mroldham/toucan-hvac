<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="beak" x1="0" x2="1">
      <stop offset="0%" stop-color="#45c86a"/>
      <stop offset="38%" stop-color="#f5df37"/>
      <stop offset="65%" stop-color="#f47c20"/>
      <stop offset="100%" stop-color="#c81931"/>
    </linearGradient>
    <linearGradient id="body" x1="0" x2="1">
      <stop offset="0%" stop-color="#050707"/>
      <stop offset="65%" stop-color="#07171d"/>
      <stop offset="100%" stop-color="#12303a"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <path d="M115 145 C70 148 34 137 10 125 C55 122 88 111 132 100 Z" fill="#050707"/>
    <path d="M48 135 C34 138 20 144 6 155 C35 154 61 148 86 139 Z" fill="#a7192d"/>

    <g class="wing wing-back">
      <path d="M190 108 C130 42 75 24 35 18 C85 75 115 126 185 151 Z" fill="#071014"/>
      <path d="M95 50 C72 34 50 24 35 18 C70 67 102 110 150 138 Z" fill="#1b2d34" opacity=".8"/>
    </g>

    <ellipse cx="205" cy="142" rx="90" ry="45" fill="url(#body)"/>
    <ellipse cx="270" cy="137" rx="42" ry="48" fill="#f2d936"/>
    <circle cx="300" cy="109" r="42" fill="#f3df3c"/>

    <g class="wing wing-front">
      <path d="M185 118 C145 46 98 8 60 0 C83 70 103 135 182 166 Z" fill="#050707"/>
      <path d="M98 35 C82 19 68 7 60 0 C78 62 105 117 160 152 Z" fill="#1b2d34" opacity=".75"/>
    </g>

    <path d="M318 91 C382 54 462 66 512 100 C465 111 385 117 315 115 Z" fill="url(#beak)"/>
    <path d="M478 92 C498 94 511 99 516 105 C499 112 482 115 462 114 C470 108 476 101 478 92 Z" fill="#c81931"/>
    <path d="M318 113 C380 119 445 116 512 101" fill="none" stroke="#1b2425" stroke-width="7" stroke-linecap="round"/>
    <circle cx="311" cy="100" r="8" fill="#0b1518"/>
    <circle cx="313" cy="98" r="3" fill="#fff"/>

    <path d="M238 176 C256 202 294 211 336 204 C302 230 246 222 210 184 Z" fill="#b0192c"/>
    <path d="M213 177 C194 200 176 212 154 219" stroke="#1d2325" stroke-width="8" stroke-linecap="round"/>
  </g>

  <style>
    .wing-front {
      transform-origin: 190px 140px;
      animation: flapFront .75s ease-in-out infinite;
    }
    .wing-back {
      transform-origin: 185px 135px;
      animation: flapBack .75s ease-in-out infinite;
    }
    @keyframes flapFront {
      0%,100% { transform: rotate(-8deg) translateY(-4px); }
      50% { transform: rotate(18deg) translateY(14px); }
    }
    @keyframes flapBack {
      0%,100% { transform: rotate(10deg) translateY(6px); }
      50% { transform: rotate(-16deg) translateY(-12px); }
    }
  </style>
</svg>
